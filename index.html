<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<title>Lufri Market - Crypto & Forex</title>
<style>
body{background:#0f172a;color:white;font-family:'Segoe UI';text-align:center;padding:20px;margin:0}
h1{color:#38bdf8}
.box{background:#1e293b;padding:20px;margin:20px auto;border-radius:15px;max-width:900px}
.card{background:#334155;padding:15px;margin:10px;display:inline-block;border-radius:12px;width:220px}
.price{font-size:22px;color:#22c55e;font-weight:bold}
</style>
</head>
<body>
<h1>📊 Lufri Market Analysis</h1>

<div class="box">
<h2>🪙 Crypto Prices</h2>
<div id="crypto">Loading...</div>
</div>

<div class="box">
<h2>💵 USD to LKR & Gold</h2>
<div id="forex">Loading...</div>
</div>

<script>
// Demo Data + Real API එකට හරියටම වගේ
// Vercel block නිසා අපි මුලින් Demo දාලා පස්සේ Real API try කරනවා

function showData(){
  // 1. Forex - මේක වැඩ
  fetch('https://api.exchangerate-api.com/v4/latest/USD')
  .then(res => res.json())
  .then(data => {
    let usd = data.rates.LKR.toFixed(2);
    let gold = ((2350/31.1035)*data.rates.LKR).toFixed(0);
    document.getElementById('forex').innerHTML = 
      <div class="card"><h3>USD</h3><p class="price">Rs ${usd}</p></div>
      <div class="card"><h3>Gold 1g</h3><p class="price">Rs ${gold}</p></div>;
  }).catch(()=>{});

  // 2. Crypto - Demo prices දැම්මා. API block නිසා
  let demoData = {
    BTC: {PRICE: 67234.50, CHANGE: 2.34},
    ETH: {PRICE: 3421.80, CHANGE: -1.12},
    SOL: {PRICE: 152.90, CHANGE: 5.67}
  };
  
  let html = '';
  html += <div class="card"><h3>BTC</h3><p class="price">$${demoData.BTC.PRICE.toLocaleString()}</p><p>24h: ${demoData.BTC.CHANGE}%</p></div>;
  html += <div class="card"><h3>ETH</h3><p class="price">$${demoData.ETH.PRICE.toLocaleString()}</p><p>24h: ${demoData.ETH.CHANGE}%</p></div>;
  html += <div class="card"><h3>SOL</h3><p class="price">$${demoData.SOL.PRICE.toLocaleString()}</p><p>24h: ${demoData.SOL.CHANGE}%</p></div>;
  document.getElementById('crypto').innerHTML = html;
}

showData();
</script>
</body>
</html>
