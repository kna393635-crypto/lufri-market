<!DOCTYPE html>
<html>
<head>
<title>Lufri Market</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;text-align:center;padding:20px}
.box{background:#1e293b;padding:20px;margin:20px auto;border-radius:10px;max-width:800px}
.card{background:#334155;padding:15px;margin:10px;display:inline-block;border-radius:10px;width:200px}
.price{font-size:20px;color:#22c55e;font-weight:bold}
</style>
</head>
<body>
<h1>📊 Lufri Market</h1>

<div class="box">
<h2>Crypto</h2>
<div id="crypto">Loading...</div>
</div>

<div class="box">
<h2>Forex LKR</h2>
<div id="forex">Loading...</div>
</div>

<script>
fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true')
.then(res => res.json())
.then(data => {
  document.getElementById('crypto').innerHTML = 
  <div class="card"><h3>BTC</h3><p class="price">$${data.bitcoin.usd}</p></div>
   <div class="card"><h3>ETH</h3><p class="price">$${data.ethereum.usd}</p></div>;
});

fetch('https://open.er-api.com/v6/latest/USD')
.then(res => res.json())
.then(data => {
  let lkr = data.rates.LKR.toFixed(2);
  document.getElementById('forex').innerHTML = 
  <div class="card"><h3>USD</h3><p class="price">Rs ${lkr}</p></div>;
});
</script>
</body>
</html>
