<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<title>Lufri Market - Crypto & Forex</title>
<style>
body{background:#0f172a;color:white;font-family:'Segoe UI';text-align:center;padding:20px;margin:0}
h1{color:#38bdf8}
.box{background:#1e293b;padding:20px;margin:20px auto;border-radius:15px;max-width:900px}
.card{background:#334155;padding:15px;margin:10px;display:inline-block;border-radius:12px;width:220px}
.price{font-size:22px;color:#22c55e;font-weight:bold}
</style>
</head>
<body>
<h1>📊 Lufri Market Analysis</h1>

<div class="box">
<h2>🪙 Crypto Prices</h2>
<div id="crypto">Loading...</div>
</div>

<div class="box">
<h2>💵 USD to LKR & Gold</h2>
<div id="forex">Loading...</div>
</div>

<script>
// 100% වැඩ කරන Crypto API - CryptoCompare
async function loadData(){
  try{
    let res = await fetch('https://min-api.cryptocompare.com/data/pricemultifull?fsyms=BTC,ETH,SOL&tsyms=USD');
    let data = await res.json();
    let html = '';
    
    let btc = data.RAW.BTC.USD;
    html += <div class="card"><h3>BTC</h3><p class="price">$${btc.PRICE.toLocaleString()}</p><p>24h: ${btc.CHANGEPCT24HOUR.toFixed(2)}%</p></div>;
    
    let eth = data.RAW.ETH.USD;
    html += <div class="card"><h3>ETH</h3><p class="price">$${eth.PRICE.toLocaleString()}</p><p>24h: ${eth.CHANGEPCT24HOUR.toFixed(2)}%</p></div>;
    
    let sol = data.RAW.SOL.USD;
    html += <div class="card"><h3>SOL</h3><p class="price">$${sol.PRICE.toLocaleString()}</p><p>24h: ${sol.CHANGEPCT24HOUR.toFixed(2)}%</p></div>;
    
    document.getElementById('crypto').innerHTML = html;
  }catch(e){ document.getElementById('crypto').innerHTML = 'API Error'; }

  try{
    // Forex - exchangerate-api
    let res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    let data = await res.json();
    let usd = data.rates.LKR.toFixed(2);
    let gold = ((2350/31.1035)*data.rates.LKR).toFixed(0);
    document.getElementById('forex').innerHTML = 
      <div class="card"><h3>USD</h3><p class="price">Rs ${usd}</p></div>
      <div class="card"><h3>Gold 1g</h3><p class="price">Rs ${gold}</p></div>;
  }catch(e){ document.getElementById('forex').innerHTML = 'API Error'; }
}
loadData();
setInterval(loadData, 60000); // 1 min එකට auto update
</script>
</body>
</html>
